name: Deploy Gemma on GKE

on:
  push:
    branches:
      - main

env:
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: azure/setup-helm@v4

      - name: Terraform format check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform init (no backend)
        run: terraform init -backend=false
        working-directory: terraform

      - name: Terraform validate
        run: terraform validate
        working-directory: terraform

      - name: Helm lint
        run: helm lint ./gemma-vllm     

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3

      - uses: azure/setup-helm@v4

      - name: Terraform init
        run: terraform init
        working-directory: terraform

      - name: Terraform plan
        run: terraform plan
        working-directory: terraform

      - name: Terraform apply
        run: terraform apply -auto-approve
        working-directory: terraform

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials \
            "$(terraform output -raw cluster_name)" \
            --zone "$(terraform output -raw zone)" \
            --project "${{ secrets.GCP_PROJECT_ID }}"
        working-directory: terraform

      - name: Deploy Helm chart
        run: |
          helm upgrade --install gemma ./gemma-vllm \
            --set huggingface.token="${{ secrets.HF_TOKEN }}" \
            --wait --timeout 25m

      - name: Validate deployment
        run: |
          echo "=== Nodes ==="
          kubectl get nodes

          echo "=== Pods ==="
          kubectl get pods

          echo "=== GPU check ==="
          kubectl get nodes \
            -o custom-columns="NAME:.metadata.name,GPU:.status.capacity.nvidia\.com/gpu"

          echo "=== Rollout status ==="
          kubectl rollout status deployment/gemma-vllm --timeout=10m

          echo "=== Health check ==="
          kubectl port-forward svc/gemma-vllm 8080:80 &
          sleep 10
          curl -f http://localhost:8080/health && echo "✅ API healthy"